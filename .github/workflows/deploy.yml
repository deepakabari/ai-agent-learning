# =============================================================
# AI Agent — CI/CD Pipeline
# Build → Push to ECR → Deploy to ECS Fargate
# =============================================================
#
# Prerequisites:
#   1. AWS OIDC Identity Provider configured for GitHub Actions
#   2. IAM Role with ECR + ECS permissions
#   3. ECR repositories: ai-agent-backend, ai-agent-frontend
#   4. GitHub Secrets: AWS_ACCOUNT_ID, AWS_ROLE_ARN, GOOGLE_API_KEY
# =============================================================

name: Deploy AI Agent

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Prevent overlapping deployments
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: us-east-1
  BACKEND_ECR_REPO: ai-agent-backend
  FRONTEND_ECR_REPO: ai-agent-frontend

permissions:
  id-token: write   # Required for OIDC
  contents: read

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Lint & Test
  # ─────────────────────────────────────────────
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service: [backend, frontend]

    defaults:
      run:
        working-directory: ${{ matrix.service }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: ${{ matrix.service }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Run linter
        run: npm run lint --if-present

      - name: Run tests
        run: npm test --if-present
        env:
          NODE_ENV: test
          GOOGLE_API_KEY: test-key-for-ci

  # ─────────────────────────────────────────────
  # Job 2: Build & Push Docker Images to ECR
  # ─────────────────────────────────────────────
  build-and-push:
    name: Build & Push (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: lint-and-test
    environment: development
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    strategy:
      matrix:
        include:
          - service: backend
            ecr_repo_env: BACKEND_ECR_REPO
            dockerfile: backend/Dockerfile
            context: backend
          - service: frontend
            ecr_repo_env: FRONTEND_ECR_REPO
            dockerfile: frontend/Dockerfile
            context: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify secrets are present
        run: |
          if [ -z "${{ secrets.AWS_ROLE_ARN }}" ]; then
            echo "❌ AWS_ROLE_ARN is missing in this context!"
            exit 1
          else
            echo "✅ AWS_ROLE_ARN is configured."
          fi

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          target: production
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ matrix.service == 'backend' && env.BACKEND_ECR_REPO || env.FRONTEND_ECR_REPO }}:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/${{ matrix.service == 'backend' && env.BACKEND_ECR_REPO || env.FRONTEND_ECR_REPO }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Output image URI
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ matrix.service == 'backend' && env.BACKEND_ECR_REPO || env.FRONTEND_ECR_REPO }}
        run: |
          echo "### 🐳 Docker Image Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|:---------|:------|" >> $GITHUB_STEP_SUMMARY
          echo "| Service | ${{ matrix.service }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Image | \`$ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────
  # Job 3: Deploy to ECS Fargate (Parallelized)
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to ECS (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    environment: production

    strategy:
      matrix:
        service: [backend, frontend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition ai-agent-${{ matrix.service }} \
            --query taskDefinition \
            > task-def.json

      - name: Update image in task definition
        id: render-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-def.json
          container-name: ai-agent-${{ matrix.service }}
          image: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ matrix.service == 'backend' && env.BACKEND_ECR_REPO || env.FRONTEND_ECR_REPO }}:${{ github.sha }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-task-def.outputs.task-definition }}
          service: ai-agent-${{ matrix.service }}-service
          cluster: ai-agent-cluster
          wait-for-service-stability: true

